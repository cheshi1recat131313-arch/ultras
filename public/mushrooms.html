<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бесплатные грибы</title>
    <link rel="stylesheet" href="css/hools.css">
    <link rel="stylesheet" href="css/game-shell.css">
    <link rel="stylesheet" href="css/referrals.css">
    <link rel="stylesheet" href="css/ultras-dark-theme.css">
</head>
<body class="hools game-shell ultras-dark">
<div class="app">
    <header class="header" id="header"></header>
    <div class="ref-page">
        <h1 class="ref-title">Бесплатные грибы</h1>
        <p class="ref-desc">
            Приглашай друзей по своей ссылке. Когда они зарегистрируются, они появятся в блокноте.
            Награды за рефералов добавим позже.
        </p>

        <div class="ref-link-box">
            <p class="ref-link-label">Твоя ссылка</p>
            <div class="ref-link-row">
                <input class="ref-link-input" id="refLinkInput" type="text" readonly aria-label="Реферальная ссылка">
                <button type="button" class="ref-copy-btn" id="refCopyBtn">Копировать</button>
            </div>
        </div>

        <div class="ref-stats">
            <div class="ref-stat-card">
                <span class="ref-stat-value" id="refInvitedCount">0</span>
                <span class="ref-stat-label">Приглашено игроков</span>
            </div>
            <div class="ref-stat-card">
                <span class="ref-stat-value" id="refActiveCount">0</span>
                <span class="ref-stat-label">Активных игроков</span>
            </div>
        </div>

        <a class="item ref-notebook-link" href="/notebook.html">Блокнот — приглашённые →</a>

        <a class="item back" href="/game.html">← В игру</a>
    </div>
    <footer class="site-footer" id="site-footer"></footer>
</div>
<div id="msg" class="msg"></div>
<script src="js/session.js"></script>
<script src="js/api.js"></script>
<script src="js/header.js"></script>
<script src="js/referrals.js"></script>
<script>
(async () => {
    const user = await fetchUser();
    if (!user) return;
    renderHeaderBlock(user);
    await initMushroomsPage();
})();
</script>
</body>
</html>
