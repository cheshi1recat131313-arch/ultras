<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Выбор персонажа</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial; color: white; background: #0b0b0b; }
.overlay {
    width: 100%; min-height: 100vh;
    background: rgba(0,0,0,0.65);
    display: flex; justify-content: center; align-items: flex-start;
    padding: 20px 0 40px;
}
.wrap { width: 100%; max-width: 500px; padding: 20px; margin: 0 auto; }
h1 { margin-bottom: 20px; text-align: center; }
.card {
    display: flex; align-items: center;
    background: rgba(20,20,20,0.9);
    border-radius: 12px; padding: 12px; margin-bottom: 15px;
    border: 1px solid #2b2b2b;
}
.card img {
    width: 70px; height: 70px; border-radius: 10px; margin-right: 12px; flex-shrink: 0;
    background: #e8c84a;
    box-shadow: none;
    object-fit: cover;
}
/* Прозрачные PNG (Шустрый) — фон карточки, без жёлтой подложки */
.card img.img-ava-clear {
    background: transparent;
}
.info { width: 100%; }
.info h2 { font-size: 16px; margin-bottom: 5px; }
.info p { font-size: 13px; color: #bbb; margin-bottom: 8px; }
.btn {
    width: 100%; padding: 10px;
    background: linear-gradient(90deg, #ff3b3b, #b80000);
    border: none; color: white; border-radius: 6px; cursor: pointer;
}
.status { text-align: center; margin-bottom: 14px; color: #ff8d8d; min-height: 20px; }
</style>
</head>
<body>
<div class="overlay">
<div class="wrap">
<h1>Выбери персонажа</h1>
<div class="status" id="status"></div>
<!--CARDS-->
</div>
</div>

<script src="js/session.js"></script>
<script>
const statusEl = document.getElementById("status");

async function init() {
    const email = getStoredEmail();
    if (!email) {
        window.location.href = "/index.html";
        return;
    }
    const user = await fetchUserByEmail(email);
    if (!user) {
        clearSession();
        window.location.href = "/index.html";
        return;
    }
    if (!user.name) {
        window.location.replace("/name.html");
        return;
    }
    if (user.character) {
        window.location.replace(onboardingUrl(user));
        return;
    }
    document.querySelectorAll("[data-id]").forEach((btn) => {
        btn.addEventListener("click", () => selectCharacter(btn.dataset.id));
    });
}

async function selectCharacter(type) {
    const email = getStoredEmail();
    const response = await fetch("/character", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, character: type })
    });
    const data = await response.json();
    if (!response.ok) {
        statusEl.textContent = data.error || "Не удалось сохранить персонажа";
        return;
    }
    if (data.user) syncSessionFromUser(data.user);
    window.location.href = "/club.html";
}

init();
</script>
</body>
</html>
