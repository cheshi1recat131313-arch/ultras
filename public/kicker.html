<!DOCTYPE html> <html lang="ru"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Настольный футбол</title> <link rel="stylesheet" href="css/hools.css"> <link rel="stylesheet" href="css/game-shell.css"> <link rel="stylesheet" href="css/center.css"> <link rel="stylesheet" href="css/ultras-dark-theme.css">
</head> <body class="hools center-scope game-shell ultras-dark"> <div class="app"> <header class="header" id="header"></header> <div class="center-meat"> <h1 class="center-h1">Настольный футбол</h1> <p class="center-desc"> Сыграй с мастерами своего дела. Помни: чем выше ставка, тем сильнее соперник. </p> <div class="center-hint">Подсказка.</div> <div id="cooldownBox" class="center-cooldown" style="display:none"></div> <div id="msg" class="msg"></div> <div id="rows"></div> <a class="item back" href="/center.html">← Назад в Центр</a> </div> <footer class="site-footer" id="site-footer"></footer> </div> <script src="js/session.js"></script> <script src="js/api.js"></script> <script src="js/header.js"></script> <script> const OPP = [ { id:"ney", name:"Нэй", emoji:"🇧🇷", cost: 9, win: 1 }, { id:"massi", name:"Масси", emoji:"🇦🇷", cost: 99, win: 3 }, { id:"ronny", name:"Ронни", emoji:"🇵🇹", cost: 199, win: 7 } ]; function fmt(ms) { if (ms <= 0) return"00:00:00"; const s = Math.floor(ms / 1000); const h = String(Math.floor(s / 3600)).padStart(2,"0"); const m = String(Math.floor((s % 3600) / 60)).padStart(2,"0"); const sec = String(s % 60).padStart(2,"0"); return `${h}:${m}:${sec}`; } let cooldownTimer = null; function renderRows(locked) { const root = document.getElementById("rows"); root.innerHTML = OPP.map( (o) => ` <div class="kicker-row"> <div class="kicker-ava">${o.emoji}</div> <div class="kicker-meta"> <div class="kicker-name">${o.name}</div> <div>Стоимость: ${o.cost} ₽ · Выигрыш: ${o.win} $</div> </div> <button type="button" class="kicker-play" data-id="${o.id}" ${locked ?"disabled" :""}>Играть</button> </div>` ).join(""); root.querySelectorAll(".kicker-play").forEach((btn) => { btn.onclick = async () => { const { ok, data } = await postJson("/center/kicker/play", { email: getEmail(), opponentId: btn.dataset.id }); showMsg(ok ? data.message : data.error, !ok); if (data.user) renderHeaderBlock(data.user); await refreshState(); }; }); } async function refreshState() { const res = await fetch(`/center/kicker/state?email=${encodeURIComponent(getEmail())}`); const data = await res.json(); if (!data.success) return; const cd = document.getElementById("cooldownBox"); if (cooldownTimer) { clearInterval(cooldownTimer); cooldownTimer = null; } const until = data.cooldownUntil || 0; const left = Math.max(0, until - Date.now()); if (left > 0) { cd.style.display ="block"; cd.textContent = `Ты недавно играл уже, приходи через ${fmt(left)}`; renderRows(true); cooldownTimer = setInterval(() => { const rem = Math.max(0, until - Date.now()); cd.textContent = `Ты недавно играл уже, приходи через ${fmt(rem)}`; if (rem <= 0) { clearInterval(cooldownTimer); cooldownTimer = null; cd.style.display ="none"; renderRows(false); } }, 1000); } else { cd.style.display ="none"; renderRows(false); } } (async () => { const user = await fetchUser(); if (!user) return; renderHeaderBlock(user); await refreshState(); })(); </script> </body> </html>
