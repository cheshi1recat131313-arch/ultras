<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Паб</title>
    <link rel="stylesheet" href="css/hools.css">
    <link rel="stylesheet" href="css/game-shell.css">
    <link rel="stylesheet" href="css/pub.css">
    <link rel="stylesheet" href="css/ultras-dark-theme.css">
</head>
<body class="hools game-shell ultras-dark ultras-theme-green">
<div class="app">
    <header class="header" id="header"></header>

    <div class="pub-page">
        <h1 class="pub-title">Паб</h1>
        <div id="pubChatLog" class="pub-chat-log" aria-live="polite"></div>
        <div class="pub-compose">
            <input type="text" id="pubChatInput" class="pub-input" placeholder="Текст сообщения" autocomplete="off" maxlength="200">
            <div class="pub-send-row">
                <button type="button" id="pubChatSend" class="pub-send-btn">Отправить</button>
            </div>
            <p class="pub-hint">До 200 символов · не чаще 1 сообщения в 5 сек</p>
        </div>
    </div>

    <div class="list pub-back-wrap">
        <a class="item back" href="/game.html">← На главную</a>
    </div>

    <footer class="site-footer" id="site-footer"></footer>
</div>
<div id="msg" class="msg"></div>
<script src="js/session.js"></script>
<script src="js/api.js"></script>
<script src="js/header.js"></script>
<script src="js/pub-chat.js"></script>
<script>
(async () => {
    const user = await fetchUser();
    if (!user) return;
    renderHeaderBlock(user);
    await initPubChat();
})();
</script>
</body>
</html>
