<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Футбольные фанаты</title>
    <link rel="stylesheet" href="css/hools.css">
    <link rel="stylesheet" href="css/game-shell.css">
    <link rel="stylesheet" href="css/game-home-hools.css">
    <link rel="stylesheet" href="css/main-quest-widget.css">
    <link rel="stylesheet" href="css/happy-hour.css">
</head>
<body class="hools game-shell game-home">
<div class="app">
    <header class="header" id="header"></header>
    <img class="banner" src="/images/bg.jpg" alt="" role="presentation">
    <div id="happyHourRoot" class="hh-root" hidden></div>
    <div id="mainQuestRoot" class="mq-root" hidden></div>
    <div class="tip">Выполняй <a href="/work.html" class="tip-link">работу</a> для того чтоб накопить больше рублей.</div>
    <nav class="menu">
        <a class="tab" id="gameTasksTab" href="/tasks.html"><img class="menu-ico" src="/static/location/index/target.svg" width="28" height="28" alt=""><span class="game-tasks-tab-label">Задания<span id="gameTasksTabCount" class="game-tasks-tab-count"></span></span></a>
        <a class="tab" href="/events.html"><img class="menu-ico" src="/static/location/index/favorite.png" width="28" height="28" alt="">События</a>
        <a class="tab" href="/rating.html"><img class="menu-ico" src="/static/location/index/trophy.svg" width="28" height="28" alt="">Рейтинг</a>
    </nav>
    <div class="list">
        <a class="item" href="/district"><img class="item-ico" src="/static/location/index/brass.png" width="16" height="16" alt="">Район</a>
        <a class="item" href="/center"><img class="item-ico" src="/static/location/index/center.png" width="16" height="16" alt="">Центр</a>
        <a class="item" href="/industrial.html"><img class="item-ico" src="/static/location/index/promzona.png" width="16" height="16" alt="">Пром. зона</a>
        <a class="item" href="/stadium.html"><img class="item-ico" src="/static/location/index/stadium.png" width="16" height="16" alt="">Стадион<span id="gameStadiumCount" class="game-home-loc-count"> [0]</span></a>
        <a class="item" href="/wasteland.html"><img class="item-ico" src="/static/location/index/firms-fight.png" width="16" height="16" alt="">Пустырь [0]</a>
        <a class="item" href="/pub-battle.html"><img class="item-ico" src="/static/location/index/pub.png" width="16" height="16" alt="">Битва за Паб</a>
        <a class="item" href="/firms.html"><img class="item-ico" src="/static/location/index/firms.png" width="16" height="16" alt="">Фирмы</a>
        <a class="item danger" href="/mushrooms.html"><img class="item-ico" src="/static/assets/img/mushroom.svg" width="16" height="16" alt="">Бесплатные грибы</a>
    </div>
    <footer class="site-footer" id="site-footer"></footer>
</div>
<div id="msg" class="msg"></div>
<script src="js/session.js"></script>
<script src="js/api.js"></script>
<script src="js/quests-badge.js"></script>
<script src="js/game-stadium-count.js"></script>
<script src="js/header.js"></script>
<script src="js/happy-hour.js"></script>
<script src="js/tasks-ui.js"></script>
<script src="js/main-quest-widget.js"></script>
<script>
(async () => {
    const user = await fetchUser();
    if (!user) return;
    renderHeaderBlock(user);
    if (typeof startQuestsTabBadgePoll === "function") startQuestsTabBadgePoll(user.email);
    if (typeof startStadiumUpcomingCountPoll === "function") startStadiumUpcomingCountPoll();
    if (typeof loadMainQuestWidget === "function") loadMainQuestWidget(user.email);
    if (typeof tryShowHappyHourOnEntry === "function") tryShowHappyHourOnEntry();
})();
</script>
</body>
</html>
