<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перс</title>
    <link rel="stylesheet" href="css/hools.css">
    <link rel="stylesheet" href="css/game-shell.css">
</head>
<body class="hools game-shell">
<div class="app">
    <header class="header" id="header"></header>
    <div class="page-title" id="persMenuTitle">Перс</div>
    <nav class="list" id="persMenu">
        <a class="item danger" href="#" data-stub="VIP">VIP</a>
        <a class="item" href="#" data-stub="Быстрый старт">Быстрый старт</a>
        <a class="item" href="/dossier.html">Досье</a>
        <a class="item" href="/garderob.html">Гардероб</a>
        <a class="item" href="#" data-stub="Блокнот">Блокнот</a>
        <a class="item" href="#" data-stub="Достижения и награды">Достижения и награды</a>
        <a class="item" href="#" data-stub="Сейф">Сейф</a>
        <a class="item" href="#" data-stub="Талисманы">Талисманы</a>
        <a class="item" href="#" data-stub="Татухи">Татухи</a>
        <a class="item" href="#" data-stub="Настройки">Настройки</a>
        <a class="item back" href="/game.html">← Назад</a>
    </nav>
    <footer class="site-footer" id="site-footer"></footer>
</div>
<div id="msg" class="msg"></div>
<script src="js/session.js"></script>
<script src="js/api.js"></script>
<script src="js/header.js"></script>
<script>
(async () => {
    const user = await fetchUser();
    if (!user) return;
    renderHeaderBlock(user);
    document.getElementById("persMenuTitle").textContent = user.name || "Игрок";

    document.querySelectorAll("#persMenu a[data-stub]").forEach((a) => {
        a.addEventListener("click", (e) => {
            e.preventDefault();
            showMsg("Раздел «" + a.dataset.stub + "» скоро будет доступен.", true);
        });
    });
})();
</script>
</body>
</html>
