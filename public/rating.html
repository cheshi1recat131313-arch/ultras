<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рейтинг</title>
    <link rel="stylesheet" href="css/hools.css">
    <link rel="stylesheet" href="css/game-shell.css">
    <link rel="stylesheet" href="css/rating.css">
</head>
<body class="hools game-shell">
<div class="app">
    <header class="header" id="header"></header>
    <div class="page-title">Рейтинг</div>
    <p class="rating-mock-tag">Демо-данные · скоро живой рейтинг</p>
    <nav class="rating-root" id="ratingNav" aria-label="Разделы рейтинга"></nav>
    <div class="list">
        <a class="item back" href="/game.html">← В игру</a>
    </div>
    <footer class="site-footer" id="site-footer"></footer>
</div>
<script src="js/session.js"></script>
<script src="js/api.js"></script>
<script src="js/header.js"></script>
<script src="js/rating-mock.js"></script>
<script>
(function () {
    const nav = document.getElementById("ratingNav");
    const trophySrc = "/static/location/index/trophy.svg";

    function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
    }

    RATING_SECTIONS.forEach((section) => {
        const href = "/rating-view.html?kind=" + encodeURIComponent(section.id);
        const entry = document.createElement("div");
        entry.className = "rating-entry";

        const card = document.createElement("div");
        card.className = "rating-card";

        const main = document.createElement("a");
        main.className = "rating-card-main";
        main.href = href;
        main.innerHTML =
            '<span class="rating-card-ico" aria-hidden="true">' +
            '<img src="' +
            trophySrc +
            '" width="26" height="26" alt="">' +
            "</span>" +
            '<span class="rating-card-body"><span class="rating-card-title">🏆 ' +
            escapeHtml(section.title) +
            "</span></span>";

        const expand = document.createElement("button");
        expand.type = "button";
        expand.className = "rating-card-expand";
        expand.setAttribute("aria-label", "Раскрыть превью");
        expand.setAttribute("aria-expanded", "false");
        expand.textContent = "›";

        const preview = document.createElement("div");
        preview.className = "rating-preview";
        preview.hidden = true;
        const lines = getRatingPreviewLines(section, 3);
        preview.innerHTML =
            lines.map((line) => "<p>" + escapeHtml(line) + "</p>").join("") +
            '<a class="rating-preview-more" href="' +
            href +
            '">Открыть полностью →</a>';

        expand.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            const open = preview.hidden;
            preview.hidden = !open;
            expand.setAttribute("aria-expanded", open ? "true" : "false");
            expand.classList.toggle("rating-card-expand--open", open);
            entry.classList.toggle("rating-entry--open", open);
        });

        card.appendChild(main);
        card.appendChild(expand);
        entry.appendChild(card);
        entry.appendChild(preview);
        nav.appendChild(entry);
    });
})();

(async () => {
    const user = await fetchUser();
    if (!user) return;
    renderHeaderBlock(user);
})();
</script>
</body>
</html>
