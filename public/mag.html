<!DOCTYPE html>

<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Маг Геннадий</title>

    <link rel="stylesheet" href="css/hools.css">
    <link rel="stylesheet" href="css/game-shell.css">

    <link rel="stylesheet" href="css/center.css">

</head>

<body class="hools center-scope game-shell">

<div class="app">

    <header class="header" id="header"></header>

    <div class="center-meat">

        <h1 class="center-h1">Маг Геннадий</h1>

        <p class="center-desc">Эти вещи останутся с тобой навсегда и принесут тебе удачу.</p>

        <nav class="center-list">

            <a class="center-row" href="#"><span class="center-ico center-ico--hint" aria-hidden="true"></span>Подсказка.</a>

            <a class="center-row" href="/larek.html"><span class="center-ico" aria-hidden="true"></span>Ларек</a>

            <a class="center-row" href="#"><span class="center-ico center-ico--amul" aria-hidden="true"></span>Амулеты</a>

            <a class="center-row" href="#"><span class="center-ico center-ico--talis" aria-hidden="true"></span>Талисманы</a>

        </nav>

        <a class="item back center-back" href="/center.html">← Назад в Центр</a>

    </div>

    <footer class="site-footer" id="site-footer"></footer>

</div>

<div id="msg" class="msg"></div>

<script src="js/session.js"></script>
<script src="js/api.js"></script>

<script src="js/header.js"></script>

<script>

(async () => {

    const user = await fetchUser();

    if (!user) return;

    renderHeaderBlock(user);

    document.querySelectorAll('a.center-row[href="#"]').forEach((a) => {
        a.addEventListener("click", (e) => {
            e.preventDefault();
            showMsg("Раздел в разработке — скоро добавим амулеты и талисманы.", true);
        });
    });

})();

</script>

</body>

</html>
