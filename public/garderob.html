<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гардероб</title>
    <link rel="stylesheet" href="css/hools.css">
    <link rel="stylesheet" href="css/game-shell.css">
    <link rel="stylesheet" href="css/center.css">
</head>
<body class="hools center-scope game-shell">
<div class="app">
    <header class="header" id="header"></header>
    <div class="center-meat">
        <h1 class="center-h1">Гардероб</h1>
        <p class="center-desc">Купленные вещи. Оружие и одежду надеваешь отдельно.</p>
        <div class="baryga-list" id="garderobRoot"></div>
        <a class="item back" href="/market.html">← К Барыге</a>
    </div>
    <footer class="site-footer" id="site-footer"></footer>
</div>
<div id="msg" class="msg"></div>
<script src="js/session.js"></script>
<script src="js/api.js"></script>
<script src="js/header.js"></script>
<script src="js/shop.js"></script>
<script>
function statLine(item) {
    const parts = [];
    if (item.power) parts.push(`сила +${item.power}`);
    if (item.stamina) parts.push(`стойкость +${item.stamina}`);
    if (item.speed) parts.push(`ловкость +${item.speed}`);
    if (item.intel) parts.push(`хитрость +${item.intel}`);
    return parts.join(" · ");
}

const FOOD_ITEMS = [
    {
        id: "hamburger",
        label: "Гамбургер",
        emoji: "🍔",
        icon: "/static/larek/hamburger.png",
        effect: "Использование: +100 HP",
        usage: "Использование: раз в 1 час",
        cooldownMs: 60 * 60 * 1000
    },
    {
        id: "americano",
        label: "Стаканчик Американо",
        emoji: "☕",
        icon: "/static/larek/americano.png",
        effect: "Использование: +100 энергии",
        usage: "Использование: раз в 3 часа",
        cooldownMs: 3 * 60 * 60 * 1000
    },
    {
        id: "hotdog",
        label: "Хот-дог",
        emoji: "🌭",
        icon: "/static/larek/hotdog.png",
        effect: "Использование: +100 HP",
        usage: "Использование: раз в 5 минут",
        cooldownMs: 5 * 60 * 1000
    }
];

function foodOnCooldown(itemId, user, itemDef) {
    const used = (user.consumablesUsedAt || {})[itemId] || 0;
    return Date.now() - used < itemDef.cooldownMs;
}

function renderFoodSection(user) {
    const c = user.consumables || {};
    let html =
        '<h2 style="margin:14px 14px 6px;font-size:14px;color:#ca4d29;">Еда и напитки</h2>';
    const owned = FOOD_ITEMS.filter((it) => (c[it.id] ?? 0) > 0);
    if (!owned.length) {
        html +=
            '<p style="margin:0 14px 12px;color:#555;font-size:13px;">У тебя пока ничего нет</p>';
        return html;
    }
    for (const it of owned) {
        const n = c[it.id] ?? 0;
        const onCd = foodOnCooldown(it.id, user, it);
        html +=
            `<article class="baryga-card">` +
            `<div class="baryga-card-head">` +
            `<span class="baryga-card-emoji">${it.emoji}</span>` +
            `<span class="baryga-card-name">${it.label}</span>` +
            `</div>` +
            `<div class="baryga-card-body">` +
            `<div class="baryga-owned">В наличии: <b>${n} шт.</b></div>` +
            `<div class="baryga-stat">${it.effect}</div>` +
            `<div style="margin-top:4px;font-size:12px;color:#666">${it.usage}</div>` +
            `<div class="baryga-card-actions">` +
            `<button type="button" class="garderob-use-food" data-item="${it.id}" ${onCd ? "disabled" : ""}>Использовать</button>` +
            `</div></div></article>`;
    }
    return html;
}

function bindFoodUse(user, catalog) {
    document.querySelectorAll(".garderob-use-food").forEach((btn) => {
        btn.addEventListener("click", async () => {
            if (btn.disabled) return;
            const itemId = btn.dataset.item;
            const { ok, data } = await postJson("/larek/use", {
                email: getEmail(),
                itemId
            });
            showMsg(ok ? data.message : data.error, !ok);
            if (data.user) {
                renderHeaderBlock(data.user);
                renderGarderob(data.user, catalog);
            }
        });
    });
}

function renderGarderob(user, catalog) {
    const root = document.getElementById("garderobRoot");
    const inventory = user.inventory || [];
    const eq = user.equipment || {};
    const hasFood = FOOD_ITEMS.some((it) => (user.consumables || {})[it.id] > 0);

    if (!inventory.length && !hasFood) {
        root.innerHTML =
            renderFoodSection(user) +
            '<p style="margin:14px;color:#555;font-size:13px;">Пока пусто. Купи вещи у <a href="/market.html">барыги</a> или в <a href="/larek.html">ларьке</a>.</p>';
        bindFoodUse(user, catalog);
        return;
    }

    const slotTitles = { weapon: "Оружие", clothes: "Одежда" };
    const bySlot = { weapon: [], clothes: [] };
    for (const id of inventory) {
        const item = catalog[id];
        if (item && bySlot[item.slot]) bySlot[item.slot].push(id);
    }

    let html = renderFoodSection(user);
    for (const slot of ["weapon", "clothes"]) {
        const ids = bySlot[slot];
        if (!ids.length) continue;
        html += `<h2 style="margin:14px 14px 6px;font-size:14px;color:#ca4d29;">${slotTitles[slot]}</h2>`;
        for (const id of ids) {
            const item = catalog[id];
            const worn = eq[slot] && eq[slot].id === id;
            html +=
                `<article class="baryga-card">` +
                `<div class="baryga-card-head">` +
                `<span class="baryga-card-emoji">${item.emoji || "📦"}</span>` +
                `<span class="baryga-card-name">${item.label}${worn ? " · надето" : ""}</span>` +
                `</div>` +
                `<div class="baryga-card-body">` +
                `<div class="baryga-stat">${statLine(item)}</div>` +
                `<div class="baryga-card-actions">` +
                `<button type="button" class="garderob-equip" data-item="${id}" ${worn ? "disabled" : ""}>` +
                (worn ? "Надето" : "Надеть") +
                `</button></div></div></article>`;
        }
    }
    root.innerHTML = html;
    bindFoodUse(user, catalog);

    root.querySelectorAll(".garderob-equip").forEach((btn) => {
        btn.addEventListener("click", async () => {
            if (btn.disabled) return;
            const { ok, data } = await postJson("/shop/equip", {
                email: getEmail(),
                itemId: btn.dataset.item
            });
            showMsg(ok ? data.message : data.error, !ok);
            if (data.user) {
                renderHeaderBlock(data.user);
                const catalog = await loadShopCatalog();
                renderGarderob(data.user, catalog);
            }
        });
    });
}

(async () => {
    const user = await fetchUser();
    if (!user) return;
    renderHeaderBlock(user);
    const catalog = await loadShopCatalog();
    renderGarderob(user, catalog);
})();
</script>
</body>
</html>
