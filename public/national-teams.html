<!DOCTYPE html> <html lang="ru"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Сборные</title> <link rel="stylesheet" href="css/hools.css"> <link rel="stylesheet" href="css/game-shell.css"> <link rel="stylesheet" href="css/national-teams.css"> <link rel="stylesheet" href="css/ultras-dark-theme.css"> </head> <body class="hools game-shell ultras-dark"> <div class="app"> <header class="header" id="header"></header> <div class="nt-page"> <h1 class="nt-title">Сборные</h1> <p class="nt-warning" id="ntWarning"></p> <p class="nt-status" id="ntStatus"></p> <div class="nt-list" id="ntList"></div> <div class="nt-actions" id="ntActions" hidden> <button type="button" class="nt-btn nt-btn--skip" id="ntSkipBtn">Пропустить</button> </div> </div> <div class="list"> <a class="item back" href="/game.html" id="ntBackGame" hidden>← В игру</a> <a class="item back" href="/club.html" id="ntBackClub" hidden>← К выбору клуба</a> </div> <footer class="site-footer" id="site-footer"></footer> </div> <div class="nt-modal" id="ntSkipModal" hidden> <div class="nt-modal-box" role="dialog" aria-modal="true" aria-labelledby="ntSkipTitle"> <p class="nt-modal-text" id="ntSkipTitle"></p> <div class="nt-modal-actions"> <button type="button" class="nt-btn" id="ntSkipChooseBtn">Выбрать сборную</button> <button type="button" class="nt-btn nt-btn--skip" id="ntSkipConfirmBtn">Пропустить</button> </div> </div> </div> <div class="nt-modal" id="ntChangeModal" hidden> <div class="nt-modal-box" role="dialog" aria-modal="true" aria-labelledby="ntChangeTitle"> <p class="nt-modal-text" id="ntChangeTitle"></p> <div class="nt-modal-actions"> <button type="button" class="nt-btn" id="ntChangeConfirmBtn">Продолжить</button> <button type="button" class="nt-btn nt-btn--ghost" id="ntChangeCancelBtn">Отмена</button> </div> </div> </div> <script src="js/session.js"></script> <script src="js/api.js"></script> <script src="js/header.js"></script> <script src="js/national-teams.js"></script> <script> let pageState = null; let pendingTeamId = null; function esc(s) { const d = document.createElement("div"); d.textContent = s == null ?"" : String(s); return d.innerHTML; } function showModal(el) { el.hidden = false; } function hideModal(el) { el.hidden = true; } async function selectTeam(teamId, confirmChange) { const statusEl = document.getElementById("ntStatus"); const email = getStoredEmail(); const res = await fetch("/national-team", { method:"POST", headers: {"Content-Type":"application/json" }, body: JSON.stringify({ email, team: teamId, confirmChange: Boolean(confirmChange), onboarding: Boolean(pageState && pageState.inOnboarding) }) }); const data = await res.json(); if (!res.ok) { if (data.needsConfirm) { pendingTeamId = teamId; document.getElementById("ntChangeTitle").textContent = pageState.changeConfirmText || data.error ||"Смена сборной стоит 1000 грибов. Продолжить?"; showModal(document.getElementById("ntChangeModal")); return; } statusEl.textContent = data.error ||"Не удалось сохранить сборную"; return; } if (data.user) { syncSessionFromUser(data.user); renderHeaderBlock(data.user); } statusEl.textContent =""; if (!data.user || !data.user.club) { window.location.href ="/club.html"; return; } window.location.href ="/game.html"; } function onTeamClick(teamId) { if (!pageState) return; if (pageState.hasTeam && teamId !== pageState.myTeamId) { pendingTeamId = teamId; document.getElementById("ntChangeTitle").textContent = pageState.changeConfirmText; showModal(document.getElementById("ntChangeModal")); return; } selectTeam(teamId, false); } async function init() { const email = getStoredEmail(); if (!email) { window.location.href ="/index.html"; return; } const user = await fetchUserByEmail(email); if (!user) { clearSession(); window.location.href ="/index.html"; return; } if (!user.character) { window.location.href ="/character.html"; return; } if (!user.club) { window.location.href ="/club.html"; return; } renderHeaderBlock(user); const res = await fetch("/national-teams/state?email=" + encodeURIComponent(email)); const data = await res.json(); if (!data.success || !data.state) { document.getElementById("ntStatus").textContent ="Не удалось загрузить список сборных."; return; } pageState = data.state; if (!pageState.inOnboarding) { try { const playRes = await fetch("/national-teams/play", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email }) }); const playData = await playRes.json(); if (playData.user) { syncSessionFromUser(playData.user); renderHeaderBlock(playData.user); } } catch { /* ignore */ } } document.getElementById("ntWarning").textContent = pageState.warning ||""; const inOnboarding = pageState.inOnboarding; document.getElementById("ntBackGame").hidden = inOnboarding; document.getElementById("ntBackClub").hidden = !inOnboarding; document.getElementById("ntActions").hidden = !inOnboarding; document.getElementById("ntSkipTitle").textContent = pageState.skipWarning ||""; const listEl = document.getElementById("ntList"); let html =""; (pageState.teams || []).forEach((team) => { const selectable = team.canSelect; const rowCls ="nt-row" + (selectable ?" nt-row--selectable" :""); const badge = team.selected ? '<span class="nt-badge">Выбрано</span>' :""; html += '<article class="' + rowCls + '"' + (selectable ? ' data-team="' + esc(team.id) + '"' :"") +">" + '<img class="nt-flag" src="' + esc(team.flag) + '" width="48" height="32" alt="" loading="lazy">' + '<div class="nt-info">' + '<p class="nt-name">' + esc(team.name) +"</p>" + '<p class="nt-desc">' + esc(team.description) +"</p>" +"</div>" + badge +"</article>"; }); listEl.innerHTML = html; listEl.querySelectorAll("[data-team]").forEach((row) => { row.addEventListener("click", () => onTeamClick(row.dataset.team)); }); document.getElementById("ntSkipBtn").addEventListener("click", () => { showModal(document.getElementById("ntSkipModal")); }); document.getElementById("ntSkipChooseBtn").addEventListener("click", () => { hideModal(document.getElementById("ntSkipModal")); }); document.getElementById("ntSkipConfirmBtn").addEventListener("click", () => { window.location.href ="/game.html"; }); document.getElementById("ntChangeCancelBtn").addEventListener("click", () => { pendingTeamId = null; hideModal(document.getElementById("ntChangeModal")); }); document.getElementById("ntChangeConfirmBtn").addEventListener("click", () => { if (!pendingTeamId) return; hideModal(document.getElementById("ntChangeModal")); selectTeam(pendingTeamId, true); pendingTeamId = null; }); } init(); </script> </body> </html>
