<!DOCTYPE html> <html lang="ru"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Задания</title> <link rel="stylesheet" href="css/hools.css"> <link rel="stylesheet" href="css/game-shell.css"> <link rel="stylesheet" href="css/tasks.css"> <link rel="stylesheet" href="css/ultras-dark-theme.css"> </head> <body class="hools game-shell ultras-dark"> <div class="app"> <header class="header" id="header"></header> <div class="page-title">Задания</div> <div class="tasks-tabs" role="tablist"> <button type="button" class="tasks-tab tasks-tab--active" id="tabMain" data-tab="main">Основные</button> <button type="button" class="tasks-tab" id="tabDaily" data-tab="daily">Ежедневные</button> </div> <div id="msg" class="msg"></div> <div id="panelMain" class="tasks-tab-panel"> <p class="tasks-chain-hint" id="mainHint">Актуальные невыполненные задания — выполненные исчезают из списка.</p> <div id="mainTasksRoot" class="tasks-root"></div> </div> <div id="panelDaily" class="tasks-tab-panel" hidden> <p class="tasks-reset" id="resetTimer">Обновление через —:—</p> <div id="dailyTasksRoot" class="tasks-root"></div> </div> <div class="list"> <a class="item back" href="/game.html">← В игру</a> </div> <footer class="site-footer" id="site-footer"></footer> </div> <script src="js/session.js"></script> <script src="js/api.js"></script> <script src="js/header.js"></script> <script src="js/tasks-ui.js"></script> <script src="js/quests-badge.js"></script> <script> let tasksData = null; let activeTab ="main"; let resetDeadline = 0; function formatTimer(ms) { const totalMin = Math.max(0, Math.ceil(ms / 60000)); const h = Math.floor(totalMin / 60); const m = totalMin % 60; return String(h).padStart(2,"0") +":" + String(m).padStart(2,"0"); } function renderQuestCard(q, opts) { const done = q.done ?" tasks-card--done" :""; const locked = q.locked ?" tasks-card--locked" :""; const active = q.active && !q.locked ?" tasks-card--active" :""; const cat = q.category || opts.category ||"daily"; let extra =""; if (q.locked) { extra = '<span class="tasks-locked-badge">Сначала выполни предыдущее задание</span>'; } else if (q.done) { extra = '<span class="tasks-done-badge">Задание выполнено</span>'; } const progress = q.locked ?"" : renderProgressBarHtml(q); return ( `<article class="tasks-card${done}${locked}${active}">` + `<h3 class="tasks-card-title">${escapeTasksHtml(q.title)}</h3>` + `<div class="tasks-reward-row">` + `<span class="tasks-reward-label">Награда:</span>` + `${formatQuestRewardHtml(q)}` + `</div>` + progress + extra + `<a class="tasks-desc-btn" href="${questDetailUrl(q.id, cat)}">Описание</a>` + `</article>` ); } function renderMainQuests(data) { const root = document.getElementById("mainTasksRoot"); const hint = document.getElementById("mainHint"); if (!root) return; const quests = data.mainQuests || []; if (hint) { hint.textContent = data.mainQuestsAllDone ? "Все основные задания выполнены! Переходи к ежедневным." : "Актуальные невыполненные задания — выполненные исчезают из списка."; } root.innerHTML = renderMainQuestChainHtml(quests); } function renderDailyQuests(data) { const root = document.getElementById("dailyTasksRoot"); if (!root) return; const byTier = {}; (data.dailyQuests || data.quests || []).forEach((q) => { const t = q.tier || 1; if (!byTier[t]) byTier[t] = []; byTier[t].push(q); }); let html =""; const tiers = Object.keys(byTier) .map(Number) .sort((a, b) => a - b); for (const tier of tiers) { html += `<h2 class="tasks-tier">Уровень ${tier}</h2>`; for (const q of byTier[tier]) { html += renderQuestCard({ ...q, category:"daily" }, { category:"daily" }); } } root.innerHTML = html || '<p class="district-hint">Задания скоро появятся.</p>'; } function updateResetTimerDisplay(msLeft, resetLabel) { const timer = document.getElementById("resetTimer"); if (!timer) return; timer.hidden = activeTab !=="daily"; if (activeTab !=="daily") return; if ((msLeft || 0) <= 0 && !resetLabel) { timer.textContent ="Обновление заданий…"; return; } timer.textContent ="Обновление через " + (resetLabel || formatTimer(msLeft || 0)); } function setActiveTab(tab) { activeTab = tab ==="daily" ?"daily" :"main"; const mainBtn = document.getElementById("tabMain"); const dailyBtn = document.getElementById("tabDaily"); const mainPanel = document.getElementById("panelMain"); const dailyPanel = document.getElementById("panelDaily"); const timer = document.getElementById("resetTimer"); if (mainBtn) mainBtn.classList.toggle("tasks-tab--active", activeTab ==="main"); if (dailyBtn) dailyBtn.classList.toggle("tasks-tab--active", activeTab ==="daily"); if (mainPanel) mainPanel.hidden = activeTab !=="main"; if (dailyPanel) dailyPanel.hidden = activeTab !=="daily"; if (timer) timer.hidden = activeTab !=="daily"; try { history.replaceState(null,"", activeTab ==="daily" ?"?tab=daily" :"?tab=main"); } catch { /* ignore */ } if (activeTab ==="daily") updateResetTimerDisplay(resetDeadline - Date.now()); } async function loadTasks() { const email = getEmail(); if (!email) return; const res = await fetch("/daily-quests?email=" + encodeURIComponent(email)); const data = await res.json(); if (!data.success) { showMsg(data.error ||"Не удалось загрузить задания", true); return; } tasksData = data; if (data.user) { renderHeaderBlock(data.user); syncSessionFromUser(data.user); } if (data.rewardMessages && data.rewardMessages.length) { showMsg(data.rewardMessages.join(" ·"), false); } resetDeadline = Date.now() + (data.resetInMs || 0); updateResetTimerDisplay(data.resetInMs || 0, data.resetLabel); renderMainQuests(data); renderDailyQuests(data); if (typeof applyQuestBadgeToTab ==="function") { const badge = typeof questBadgeFromPayload ==="function" ? questBadgeFromPayload(data) : data.questBadge; if (badge) applyQuestBadgeToTab(badge); } else if (typeof refreshQuestsTabBadge ==="function") { refreshQuestsTabBadge(email).catch(() => {}); } } function tickTimer() { if (activeTab !=="daily") return; const left = resetDeadline - Date.now(); if (left <= 0) { updateResetTimerDisplay(0); loadTasks(); return; } updateResetTimerDisplay(left); } document.getElementById("tabMain")?.addEventListener("click", () => setActiveTab("main")); document.getElementById("tabDaily")?.addEventListener("click", () => setActiveTab("daily")); (async () => { const params = new URLSearchParams(window.location.search); setActiveTab(params.get("tab") ==="daily" ?"daily" :"main"); await loadTasks(); setInterval(tickTimer, 1000); })(); </script> </body> </html>
