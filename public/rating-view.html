<!DOCTYPE html> <html lang="ru"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Рейтинг</title> <link rel="stylesheet" href="css/hools.css"> <link rel="stylesheet" href="css/game-shell.css"> <link rel="stylesheet" href="css/rating.css"> <link rel="stylesheet" href="css/club-elite.css"> <link rel="stylesheet" href="css/national-teams.css"> <link rel="stylesheet" href="css/ultras-dark-theme.css"> </head> <body class="hools game-shell ultras-dark"> <div class="app"> <header class="header" id="header"></header> <div class="page-title" id="pageTitle">Рейтинг</div> <p class="rating-view-hint" id="viewHint"></p> <div id="viewRoot"></div> <div class="list"> <a class="item back" href="/rating.html">← К разделам</a> <a class="item back" href="/game.html">← В игру</a> </div> <footer class="site-footer" id="site-footer"></footer> </div> <script src="js/session.js"></script> <script src="js/api.js"></script> <script src="js/clubs.js"></script> <script src="js/club-theme.js"></script> <script src="js/header.js"></script> <script src="js/rating-mock.js"></script> <script src="js/rating-top-best.js"></script> <script> function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; } function renderTable(section) { const cols = section.columns || []; let head ="<tr>"; cols.forEach((c, i) => { const cls = i === 0 ?"col-pos" : i === cols.length - 1 ?"col-val" :""; head += `<th class="${cls}">${escapeHtml(c)}</th>`; }); head +="</tr>"; let body =""; (section.rows || []).forEach((row, ri) => { const me = section.meRow === ri ?" is-me" :""; body += `<tr class="${me}">`; row.forEach((cell, ci) => { const cls = ci === 0 ?"col-pos" : ci === row.length - 1 ?"col-val" :""; body += `<td class="${cls}">${escapeHtml(cell)}</td>`; }); body +="</tr>"; }); return ( '<div class="rating-table-wrap">' + '<table class="rating-table"><thead>' + head +"</thead><tbody>" + body +"</tbody></table></div>" ); } function renderRecords(section) { let html = '<div class="rating-records">'; (section.records || []).forEach((rec) => { html += '<article class="rating-record">' + '<p class="rating-record-label">' + escapeHtml(rec.label) + '<span class="rating-record-who">' + escapeHtml(rec.who ||"") +"</span></p>" + '<span class="rating-record-val">' + escapeHtml(rec.value) +"</span></article>"; }); html +="</div>"; return html; } function skullIco() { return '<img src="/static/icons/skull.png" class="club-elite-skull-ico" width="14" height="14" alt="">'; } async function renderClubElite(email) { const res = await fetch("/rating/club-elite?email=" + encodeURIComponent(email) ); const data = await res.json(); if (!data.success || !data.elite) { return '<p class="rating-mock-tag">Не удалось загрузить элиту клуба.</p>'; } const e = data.elite; const clubsCatalog = await loadClubsCatalog(); let info =""; if (e.me) { const nextLine = e.me.nextRank ? `<p class="club-elite-info-line">Следующий ранг: <b>${escapeHtml(e.me.nextRank)}</b></p>` + `<p class="club-elite-info-line">Осталось набрать: <b>${escapeHtml(String(e.me.skullsToNext))}</b> ${skullIco()}</p>` : `<p class="club-elite-info-line">Ты на вершине рейтинга клуба.</p>`; info = `<div class="club-elite-info">` + `<p class="club-elite-info-line">За последние <b>${e.windowDays} дней</b> ты заработал <b>${escapeHtml(String(e.me.weeklySkulls))}</b> ${skullIco()}, ранг <b>${escapeHtml(e.me.rankTitle)}</b>.</p>` + nextLine + `<p class="club-elite-info-note">${escapeHtml(e.updateNote ||"")}</p>` + `</div>`; } else { info = `<div class="club-elite-info">` + `<p class="club-elite-info-line">Выбери клуб, чтобы попасть в рейтинг.</p>` + `</div>`; } let list = '<div class="club-elite-list">'; (e.players || []).forEach((p) => { const ava = p.avatar ? `<div class="club-elite-ava-wrap">${playerAvatarFrameHtml(p.avatar, { fill: p.club ? clubAvatarFill(p.club, clubsCatalog) : null, width: 48, height: 48, alt: p.name })}</div>` : `<span class="club-elite-ava club-elite-ava--ph">👤</span>`; list += `<article class="club-elite-row${p.isMe ?" club-elite-row--me" :""}">` + ava + `<div class="club-elite-row-body">` + `<p class="club-elite-name">${playerNameHtml(p.name, p.email)} <span class="club-elite-lvl">[${p.level}]</span></p>` + `<p class="club-elite-rank">Ранг: <b>${escapeHtml(p.rankTitle)}</b></p>` + `<p class="club-elite-skulls">Черепов за неделю: <b>${escapeHtml(String(p.weeklySkulls))}</b> ${skullIco()}</p>` + `</div></article>`; }); list +="</div>"; return info + list; } function formatNum(n) { const v = Number(n); if (!Number.isFinite(v)) return"0"; return v.toLocaleString("ru-RU"); } async function renderNationalTeamList() { const res = await fetch("/rating/national-teams"); const data = await res.json(); if (!data.success || !Array.isArray(data.teams)) { return '<p class="rating-mock-tag">Не удалось загрузить рейтинг сборных.</p>'; } let html = '<div class="rating-clubs-list">'; data.teams.forEach((team) => { html += '<article class="rating-club-row">' + '<span class="rating-club-pos">' + escapeHtml(String(team.position ||"")) +"</span>" + '<img class="rating-club-emblem nt-flag" src="' + escapeHtml(team.flag ||"") + '" width="48" height="32" alt="" loading="lazy" decoding="async">' + '<div class="rating-club-info">' + '<h3 class="rating-club-name">' + escapeHtml(team.name ||"") +"</h3>" + '<p class="rating-club-score">Игроков: ' + escapeHtml(formatNum(team.players)) +"</p>" + '<p class="rating-club-score">Репутация: ' + escapeHtml(formatNum(team.totalReputation)) +"</p>" + '<p class="rating-club-score">Сила: ' + escapeHtml(formatNum(team.totalPower)) +"</p>" +"</div></article>"; }); html +="</div>"; return html; } async function renderClubList() { const res = await fetch("/rating/clubs"); const data = await res.json(); if (!data.success || !Array.isArray(data.clubs)) { return '<p class="rating-mock-tag">Не удалось загрузить список клубов.</p>'; } let html = '<div class="rating-clubs-list">'; data.clubs.forEach((club) => { const rating = Number.isFinite(Number(club.rating)) ? Number(club.rating) : Number(club.totalReputation) || 0; const emblem = club.emblem ||""; const pos = club.position || club.rank ||""; html += '<a class="rating-club-row rating-club-row--link" href="/club-profile.html?club=' + encodeURIComponent(club.id ||"") + '">' + '<span class="rating-club-pos">' + escapeHtml(String(pos)) +"</span>" + '<img class="rating-club-emblem" src="' + escapeHtml(emblem) + '" width="48" height="48" alt="" loading="lazy" decoding="async">' + '<div class="rating-club-info">' + '<h3 class="rating-club-name">' + escapeHtml(club.name ||"") +"</h3>" +"<p class=\"rating-club-score\">Репутация: " + escapeHtml(formatNum(rating)) +"</p></div></a>"; }); html +="</div>"; return html; } async function renderView() { const kind = new URLSearchParams(window.location.search).get("kind") ||""; const section = getRatingSection(kind); const root = document.getElementById("viewRoot"); const titleEl = document.getElementById("pageTitle"); const hintEl = document.getElementById("viewHint"); if (!section) { titleEl.textContent ="Раздел не найден"; hintEl.textContent =""; root.innerHTML = '<p class="rating-mock-tag">Выберите раздел на странице рейтинга.</p>'; return; } document.title = section.title +" — Рейтинг"; titleEl.textContent ="🏆" + section.title; hintEl.textContent = section.hint ||""; if (section.view ==="club_elite" || section.id ==="club_elite") { root.innerHTML = await renderClubElite(viewUser.email); } else if (section.view ==="clubs" || section.id ==="clubs") { root.innerHTML = await renderClubList(); } else if (section.view ==="national_teams" || section.id ==="national_teams") { root.innerHTML = await renderNationalTeamList(); } else if (section.view ==="top_best" || section.id ==="top_best") { await renderTopBest(viewUser.email, root); } else if (section.view ==="level_best" || section.id ==="level_best") { await renderLevelBest(viewUser.email, root); } else if (section.records) { root.innerHTML = renderRecords(section); } else { root.innerHTML = renderTable(section); } } let viewUser = null; (async () => { const user = await fetchUser(); if (!user) return; viewUser = user; renderHeaderBlock(user); await renderView(); })(); </script> </body> </html>
