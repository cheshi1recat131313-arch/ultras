<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Футбольные фанаты</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">
    <div class="form">
        <h1>ВХОД</h1>

        <p>
            Футбол — это страсть, объединяющая тысячи сердец.<br>
            Тут ты найдёшь атмосферу настоящих трибун.
        </p>

        <div class="input-box">
            <input id="email" type="text" placeholder="Email">
        </div>
        <div class="error" id="emailError"></div>

        <div class="input-box">
            <input id="password" type="password" placeholder="Пароль">
        </div>
        <div class="error" id="passwordError"></div>

        <button class="login" id="loginBtn">ВОЙТИ</button>

        <div class="divider">ИЛИ</div>

        <button class="register" id="registerBtn">СОЗДАТЬ АККАУНТ</button>
        <button class="register" id="resetBtn">СБРОСИТЬ ПАРОЛЬ</button>

        <div class="terms" id="message">
            Продолжая, вы соглашаетесь с нашими условиями
        </div>
    </div>
</div>

<script src="js/session.js"></script>
<script>
const MIN_EMAIL_LENGTH = 5;
const MIN_PASSWORD_LENGTH = 6;

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

try {
    const saved = getStoredEmail();
    if (saved && !emailInput.value) emailInput.value = saved;
} catch (e) {
    /* ignore */
}

(async function autoLoginIfSaved() {
    const user = await tryRestoreSession();
    if (user && isProfileComplete(user)) {
        window.location.replace("/game.html");
    } else if (user) {
        window.location.replace(onboardingUrl(user));
    }
})();
const emailError = document.getElementById("emailError");
const passwordError = document.getElementById("passwordError");
const message = document.getElementById("message");

function clearErrors() {
    emailError.textContent = "";
    passwordError.textContent = "";
    message.textContent = "";
}

function validateFields(email, password) {
    let valid = true;

    if (email.length < MIN_EMAIL_LENGTH) {
        emailError.textContent = "Минимум 5 символов в email";
        valid = false;
    }

    if (password.length < MIN_PASSWORD_LENGTH) {
        passwordError.textContent = "Минимум 6 символов в пароле";
        valid = false;
    }

    return valid;
}

async function postJson(url, payload) {
    const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });
    const data = await response.json();
    return { ok: response.ok, data };
}

document.getElementById("registerBtn").addEventListener("click", async () => {
    clearErrors();
    const email = emailInput.value.trim().toLowerCase();
    const password = passwordInput.value.trim();

    if (!validateFields(email, password)) return;

    try {
        const { ok, data } = await postJson("/register", { email, password });
        if (!ok) {
            message.textContent = data.error || "Ошибка при регистрации";
            return;
        }
        saveSessionEmail(email);
        const user = data.user || { email, name: null, character: null, club: null };
        syncSessionFromUser(user);
        window.location.replace("/name.html");
    } catch (error) {
        message.textContent = "Ошибка соединения с сервером";
    }
});

document.getElementById("loginBtn").addEventListener("click", async () => {
    clearErrors();
    const email = emailInput.value.trim().toLowerCase();
    const password = passwordInput.value.trim();

    if (!validateFields(email, password)) return;

    try {
        const { ok, data } = await postJson("/login", { email, password });
        if (!ok) {
            message.textContent = data.error || "Ошибка при входе";
            return;
        }

        saveSessionEmail(email);
        await handleAuthSuccess(email, data.user);
    } catch (error) {
        message.textContent = "Ошибка соединения с сервером";
    }
});

document.getElementById("resetBtn").addEventListener("click", async () => {
    clearErrors();
    const email = emailInput.value.trim().toLowerCase();
    const newPassword = passwordInput.value.trim();

    if (!validateFields(email, newPassword)) return;

    try {
        const { ok, data } = await postJson("/reset-password", { email, newPassword });
        message.textContent = ok
            ? "Пароль обновлен. Теперь нажми ВОЙТИ."
            : (data.error || "Ошибка при сбросе пароля");
    } catch (error) {
        message.textContent = "Ошибка соединения с сервером";
    }
});
</script>

</body>
</html>
