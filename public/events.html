<!DOCTYPE html> <html lang="ru"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>События</title> <link rel="stylesheet" href="css/hools.css"> <link rel="stylesheet" href="css/game-shell.css"> <link rel="stylesheet" href="css/fight-page.css"> <link rel="stylesheet" href="css/events.css"> <link rel="stylesheet" href="css/ultras-dark-theme.css">
</head> <body class="hools game-shell ultras-dark"> <div class="app"> <header class="header" id="header"></header> <div class="page-title">События</div> <div id="msg" class="msg"></div> <div id="eventsRoot" class="events-root"></div> <div class="list"> <a class="item back" href="/game.html">← В игру</a> </div> <footer class="site-footer" id="site-footer"></footer> </div> <script src="js/session.js"></script> <script src="js/api.js"></script> <script src="js/header.js"></script> <script> function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; } function renderEvents(events) { const root = document.getElementById("eventsRoot"); if (!events || !events.length) { root.innerHTML = '<p class="events-empty">Пока нет записей. Сражайся, работай и выполняй задания — события появятся здесь.</p>'; return; } root.innerHTML = events .map( (ev) => `<article class="events-item"> <p class="events-time">${escapeHtml(ev.timeLabel ||"")}</p> <p class="events-summary">${ev.summaryHtml || escapeHtml(ev.summary ||"")}</p> <div class="events-more-wrap"> <a class="events-more-btn" href="/event-detail.html?id=${encodeURIComponent(ev.id)}">Подробнее</a> </div> </article>` ) .join(""); } async function loadEvents() { const email = getEmail(); if (!email) return; const res = await fetch("/api/events?email=" + encodeURIComponent(email)); const data = await res.json(); if (!data.success) { showMsg(data.error ||"Не удалось загрузить события", true); return; } renderEvents(data.events || []); } (async () => { const user = await fetchUser(); if (!user) return; renderHeaderBlock(user); await loadEvents(); })(); </script> </body> </html>
